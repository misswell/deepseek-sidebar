<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Sidebar 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px 20px;
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .app-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .app-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #2a2a4a;
      border: 1px solid #333366;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .app-item.dragging {
      opacity: 0.4;
    }
    .app-item.drag-over {
      border-color: #4a6cf7;
      border-style: dashed;
      background: #252550;
    }
    .drag-handle {
      width: 20px;
      height: 24px;
      flex-shrink: 0;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 16px;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .app-item:hover { background: #33335a; border-color: #4a4a7a; }
    .app-item.disabled { opacity: 0.5; }
    .app-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .app-name {
      flex: 1;
      font-size: 14px;
    }
    .app-url {
      font-size: 11px;
      color: #888;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #555;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .app-item.checked .checkbox {
      background: #4a6cf7;
      border-color: #4a6cf7;
    }
    .app-item.checked .checkbox::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }
    .save-bar {
      margin-top: 20px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-save { background: #4a6cf7; color: #fff; }
    .btn-save:hover { background: #3a5ce7; }
    .btn-reset { background: #333366; color: #ccc; }
    .btn-reset:hover { background: #3a3a6a; }
    .status {
      font-size: 12px;
      color: #4a6cf7;
      margin-top: 10px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>顶部栏显示设置</h1>
  <p class="subtitle">勾选要在侧边栏顶部显示的网站</p>
  <div class="app-list" id="appList"></div>
  <div class="save-bar">
    <button class="btn-save" id="saveBtn">保存</button>
    <button class="btn-reset" id="resetBtn">恢复默认</button>
  </div>
  <div class="status" id="status"></div>
  <script src="config.js"></script>
</body>
</html>
