<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; }

    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 8px;
      background: #1a1a2e;
      border-bottom: 1px solid #16213e;
      flex-shrink: 0;
      user-select: none;
    }

    .app-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .app-btn {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }

    .app-btn:hover { background: #2a2a4a; }
    .app-btn.active { border-color: rgba(255,255,255,0.5); background: #2a2a4a; }

    .app-btn img { width: 18px; height: 18px; border-radius: 2px; }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    #toolbar button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    #toolbar button:hover { background: #2a2a4a; color: #fff; }
    #toolbar button:active { background: #3a3a5a; }

    #zoom-label {
      font-size: 11px;
      color: #999;
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #webview-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    iframe {
      border: none;
      transform-origin: 0 0;
      width: 100%;
      height: 100%;
      /* visibility handled by JS */
    }

    .loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2a4a;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="app-switcher">
      <button class="app-btn active" data-app="deepseek" title="DeepSeek">
        <img src="https://chat.deepseek.com/favicon.ico" alt="DeepSeek">
      </button>
      <button class="app-btn" data-app="qianwen" title="千问">
        <img src="https://www.qianwen.com/favicon.ico" alt="千问">
      </button>
      <button class="app-btn" data-app="chatgpt" title="ChatGPT">
        <img src="https://chatgpt.com/favicon.ico" alt="ChatGPT">
      </button>
      <button class="app-btn" data-app="gemini" title="Gemini">
        <img src="https://gemini.google.com/favicon.ico" alt="Gemini">
      </button>
    </div>
    <div class="zoom-controls">
      <button id="zoom-out" title="缩小 (Ctrl/Cmd + -)">−</button>
      <span id="zoom-label">100%</span>
      <button id="zoom-in" title="放大 (Ctrl/Cmd + +)">+</button>
      <button id="refresh" title="刷新页面 (F5)">↻</button>
    </div>
  </div>
  <div id="webview-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
    <iframe id="webview" allow="clipboard-read; clipboard-write; autoplay"></iframe>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
