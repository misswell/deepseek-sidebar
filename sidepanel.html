<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; }

    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 8px;
      background: #1a1a2e;
      border-bottom: 1px solid #16213e;
      flex-shrink: 0;
      user-select: none;
    }

    .app-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .app-switcher::-webkit-scrollbar { display: none; }

    .app-btn {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }

    .app-btn:hover { background: #2a2a4a; }
    .app-btn.active { border-color: rgba(255,255,255,0.5); background: #2a2a4a; }

    .app-btn img {
      width: var(--icon-size, 20px);
      height: var(--icon-size, 20px);
      border-radius: 3px;
      object-fit: contain;
      display: block;
    }

    .app-btn[data-app="qianwen"] img { --icon-size: 18px; }
    .app-btn[data-app="gemini"] img { --icon-size: 21px; }
    .app-btn[data-app="youdao"] img { --icon-size: 20px; }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .zoom-controls button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .zoom-controls button:hover { background: #2a2a4a; color: #fff; }
    .zoom-controls button:active { background: #3a3a5a; }

    #zoom-label {
      font-size: 11px;
      color: #999;
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #webview-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    .webview-frame {
      position: absolute;
      top: 0; left: 0;
      border: none;
      transform-origin: 0 0;
      width: 100%;
      height: 100%;
      /* visibility handled by JS */
    }

    .webview-frame.hidden { display: none; }

    .loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading.hidden { opacity: 0; pointer-events: none; }

    .page-reader {
      position: absolute;
      top: 48px;
      right: 10px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      color: #111827;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .page-reader.hidden { display: none; }
    .page-reader:not(.expanded) {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #1a1a2e;
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.28);
    }

    .page-reader.expanded {
      width: min(360px, calc(100% - 20px));
      height: min(56%, 460px);
      border-radius: 6px;
    }

    .page-reader-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      height: 38px;
      padding: 0 8px 0 10px;
      border-bottom: 1px solid #d7dde6;
      background: #eef2f7;
      flex-shrink: 0;
    }

    .page-reader:not(.expanded) .page-reader-header {
      width: 100%;
      height: 100%;
      padding: 0;
      border: none;
      background: transparent;
      justify-content: center;
    }

    .page-reader-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
    }

    .page-reader:not(.expanded) .page-reader-title {
      display: none;
    }

    .page-reader-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .page-reader:not(.expanded) .page-reader-actions {
      width: 100%;
      height: 100%;
      justify-content: center;
    }

    .page-reader-actions button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #475569;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-reader-actions button:hover { background: #dfe6ef; color: #111827; }

    .page-reader:not(.expanded) .page-reader-actions button {
      display: none;
    }

    .page-reader:not(.expanded) #toggle-page-reader {
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      color: #fff;
      font-size: 18px;
    }

    .page-reader:not(.expanded) #toggle-page-reader:hover {
      background: #2a2a4a;
    }

    .page-reader:not(.expanded) .page-reader-meta,
    .page-reader:not(.expanded) #page-reader-content,
    .page-reader:not(.expanded) .page-reader-status {
      display: none;
    }

    .page-reader-meta {
      min-height: 24px;
      padding: 6px 10px;
      border-bottom: 1px solid #e4e9f0;
      color: #64748b;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #page-reader-content {
      flex: 1;
      min-height: 0;
      width: 100%;
      border: none;
      resize: none;
      outline: none;
      padding: 10px;
      background: #fff;
      color: #111827;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .page-reader-status {
      min-height: 26px;
      padding: 6px 10px;
      border-top: 1px solid #e4e9f0;
      color: #64748b;
      font-size: 11px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2a4a;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="app-switcher" id="appSwitcher"></div>
    <div class="zoom-controls">
      <button id="zoom-out" title="缩小 (Ctrl/Cmd + -)">−</button>
      <span id="zoom-label">100%</span>
      <button id="zoom-in" title="放大 (Ctrl/Cmd + +)">+</button>
      <button id="pick-element" title="选择页面元素">⌖</button>
      <button id="refresh" title="刷新页面 (F5)">↻</button>
      <button id="config-btn" title="设置">⚙</button>
    </div>
  </div>
  <div id="webview-container">
    <div class="page-reader hidden" id="page-reader">
      <div class="page-reader-header">
        <div class="page-reader-title" id="page-reader-title">当前页面内容</div>
        <div class="page-reader-actions">
          <button id="toggle-page-reader" title="展开/收起">▴</button>
          <button id="copy-page-content" title="复制页面内容">⧉</button>
          <button id="close-page-reader" title="关闭">×</button>
        </div>
      </div>
      <div class="page-reader-meta" id="page-reader-meta"></div>
      <textarea id="page-reader-content" spellcheck="false" readonly></textarea>
      <div class="page-reader-status" id="page-reader-status"></div>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
