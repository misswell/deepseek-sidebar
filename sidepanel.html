<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; }

    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 8px;
      background: #1a1a2e;
      border-bottom: 1px solid #16213e;
      flex-shrink: 0;
      user-select: none;
    }

    .app-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .app-btn {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }

    .app-btn:hover { background: #2a2a4a; }
    .app-btn.active { border-color: rgba(255,255,255,0.5); background: #2a2a4a; }

    .app-btn svg { width: 18px; height: 18px; }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    #toolbar button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    #toolbar button:hover { background: #2a2a4a; color: #fff; }
    #toolbar button:active { background: #3a3a5a; }

    #zoom-label {
      font-size: 11px;
      color: #999;
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #webview-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    iframe {
      border: none;
      transform-origin: 0 0;
      width: 100%;
      height: 100%;
      visibility: hidden;
    }

    .loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2a4a;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="app-switcher">
      <button class="app-btn active" data-app="deepseek" title="DeepSeek">
        <svg viewBox="0 0 128 128" fill="none"><circle cx="64" cy="64" r="56" fill="#4a6cf7"/><path d="M44 64C44 52.954 52.954 44 64 44C75.046 44 84 52.954 84 64C84 75.046 75.046 84 64 84" stroke="white" stroke-width="6" stroke-linecap="round"/><circle cx="64" cy="64" r="6" fill="white"/></svg>
      </button>
      <button class="app-btn" data-app="qianwen" title="千问">
        <svg viewBox="0 0 128 128" fill="none"><circle cx="64" cy="64" r="56" fill="#615BFF"/><text x="64" y="78" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="sans-serif">问</text></svg>
      </button>
      <button class="app-btn" data-app="chatgpt" title="ChatGPT">
        <svg viewBox="0 0 128 128" fill="none"><circle cx="64" cy="64" r="56" fill="#10a37f"/><path d="M82.5 58c2.4-7.2-0.6-15-7.2-19-6.4-3.8-14.6-2.8-20 2.2-5.4-4.8-13.6-5.6-20-1.6-6.6 4.2-9.2 12.2-6.4 19.4-6.6 4.2-9.4 12.2-6.6 19.4 2.8 7 10.2 11.2 17.8 10.2 2.2 7 9.2 11.6 16.8 11 7.6 0.4 14.4-4.4 16.4-11.4 7.4-0.2 14-4.8 16.4-11.6 2.6-7-0.2-14.8-6.2-18.6z" fill="white" opacity="0.9"/></svg>
      </button>
      <button class="app-btn" data-app="gemini" title="Gemini">
        <svg viewBox="0 0 128 128" fill="none"><circle cx="64" cy="64" r="56" fill="#8E75B2"/><path d="M64 28l12 20-12 20-12-20z" fill="#FFD700"/><path d="M64 60l12 20-12 20-12-20z" fill="#4285F4"/><path d="M40 48h48l-12 20H28z" fill="#EA4335" opacity="0.8"/><path d="M40 60h48l-12-20H28z" fill="#34A853" opacity="0.8"/></svg>
      </button>
    </div>
    <div class="zoom-controls">
      <button id="zoom-out" title="缩小 (Ctrl/Cmd + -)">−</button>
      <span id="zoom-label">100%</span>
      <button id="zoom-in" title="放大 (Ctrl/Cmd + +)">+</button>
      <button id="zoom-reset" title="重置缩放 (Ctrl/Cmd + 0)">↺</button>
    </div>
  </div>
  <div id="webview-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
    <iframe id="webview" allow="clipboard-read; clipboard-write; autoplay"></iframe>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
